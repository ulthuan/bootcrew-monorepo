name: Build Ubuntu

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
  pull_request:
    branches:
      - main
  #schedule:
  #  - cron: "0 1 * * TUE"
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yaml
    secrets: inherit
    with:
      image-name: ubuntu-bootc
      image-desc: "Experimental ubuntu-bootc POC image"
      image-keywords: "bootc,ubuntu"
      image-logo: "https://avatars.githubusercontent.com/u/230667510?s=400&u=cb912a5db49aee164a609a0fb4967d2d8170feb9&v=4"
      platforms: amd64
      rechunk: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
      publish: true
